# Render Blueprint configuration for PersonalChat Signaling Server
# Commit this file to the root of your Git repository and deploy via Render Blueprints.
services:
  - type: web
    name: personalchat-signaling
    runtime: node
    rootDir: signaling-server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: STUN_SERVERS
        value: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
